name: Build DiskShed

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DISKSHED_VERSION: 0.1.0
  WX_VERSION: 3.2.11

jobs:
  macos:
    name: macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            triplet: arm64-osx
          - runner: macos-15-intel
            arch: x86_64
            triplet: x64-osx
    runs-on: ${{ matrix.runner }}
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
    steps:
      - uses: actions/checkout@v4
      - name: Cache wxWidgets
        uses: actions/cache@v4
        with:
          path: vcpkg-cache
          key: vcpkg-wxwidgets-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('.github/workflows/diskshed.yml') }}
      - name: Install wxWidgets
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          "$VCPKG_INSTALLATION_ROOT/vcpkg" install "wxwidgets:${{ matrix.triplet }}"
      - name: Configure and build
        run: |
          cmake -S gui/wx -B build/diskshed -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DDISKSHED_REQUIRE_GUI=ON
          cmake --build build/diskshed
          build/diskshed/toolshed-image-smoke c3/prep19/ghcprep.dsk
      - name: Package application
        run: |
          cmake --install build/diskshed --prefix package
          test "$(lipo -archs package/DiskShed.app/Contents/MacOS/DiskShed)" = "${{ matrix.arch }}"
          if otool -L package/DiskShed.app/Contents/MacOS/DiskShed | grep -E '/(opt/homebrew|usr/local)/|libwx'; then
            echo "DiskShed contains an unbundled package-manager dependency" >&2
            exit 1
          fi
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent package/DiskShed.app \
            "dist/DiskShed-${DISKSHED_VERSION}-macos-${{ matrix.arch }}.zip"
          shasum -a 256 "dist/DiskShed-${DISKSHED_VERSION}-macos-${{ matrix.arch }}.zip" \
            > "dist/DiskShed-${DISKSHED_VERSION}-macos-${{ matrix.arch }}.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: diskshed-macos-${{ matrix.arch }}
          path: dist/*

  windows:
    name: Windows (x86_64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Set up MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
      - name: Cache wxWidgets
        uses: actions/cache@v4
        with:
          path: wx-install
          key: wxwidgets-${{ env.WX_VERSION }}-${{ runner.os }}-mingw64-static
      - name: Build wxWidgets
        shell: msys2 {0}
        run: |
          if test ! -x wx-install/bin/wx-config; then
            curl -L --fail --retry 3 \
              -o wxwidgets.tar.bz2 \
              "https://github.com/wxWidgets/wxWidgets/releases/download/v${WX_VERSION}/wxWidgets-${WX_VERSION}.tar.bz2"
            tar -xjf wxwidgets.tar.bz2
            cmake -S "wxWidgets-${WX_VERSION}" -B wx-build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$PWD/wx-install" \
              -DwxBUILD_SHARED=OFF \
              -DwxBUILD_SAMPLES=OFF \
              -DwxBUILD_TESTS=OFF \
              -DwxBUILD_DEMOS=OFF
            cmake --build wx-build
            cmake --install wx-build
          fi
      - name: Configure and build
        shell: msys2 {0}
        run: |
          cmake -S gui/wx -B build/diskshed -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DwxWidgets_CONFIG_EXECUTABLE="$PWD/wx-install/bin/wx-config" \
            -DDISKSHED_REQUIRE_GUI=ON
          cmake --build build/diskshed
          build/diskshed/toolshed-image-smoke.exe c3/prep19/ghcprep.dsk
      - name: Package application
        shell: msys2 {0}
        run: |
          cmake --install build/diskshed --prefix package
          mkdir -p dist
          cd package
          cmake -E tar cf "../dist/DiskShed-${DISKSHED_VERSION}-windows-x86_64.zip" \
            --format=zip -- DiskShed.exe
          cd ..
          sha256sum "dist/DiskShed-${DISKSHED_VERSION}-windows-x86_64.zip" \
            > "dist/DiskShed-${DISKSHED_VERSION}-windows-x86_64.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: diskshed-windows-x86_64
          path: dist/*

  linux:
    name: Linux (x86_64 AppImage)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libwxgtk3.2-dev
      - name: Configure and build
        run: |
          cmake -S gui/wx -B build/diskshed -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DDISKSHED_REQUIRE_GUI=ON
          cmake --build build/diskshed
          build/diskshed/toolshed-image-smoke c3/prep19/ghcprep.dsk
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          DESTDIR="$PWD/AppDir" cmake --install build/diskshed
          curl -L --fail --retry 3 \
            -o linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy.AppImage
          ./linuxdeploy.AppImage --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/org.nitros9.diskshed.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/org.nitros9.diskshed.svg \
            --output appimage
          mkdir -p dist
          mv DiskShed-*.AppImage "dist/DiskShed-${DISKSHED_VERSION}-linux-x86_64.AppImage"
          sha256sum "dist/DiskShed-${DISKSHED_VERSION}-linux-x86_64.AppImage" \
            > "dist/DiskShed-${DISKSHED_VERSION}-linux-x86_64.AppImage.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: diskshed-linux-x86_64
          path: dist/*

  release:
    name: Publish DiskShed release binaries
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows, linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: diskshed-*
          path: dist
          merge-multiple: true
      - name: Verify release files
        run: |
          cd dist
          sha256sum --check *.sha256
      - name: Attach binaries to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
